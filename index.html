<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Mastering Suite</title>

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>
body {
  background: #0F0F0F;
  color: #F0F0F0;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.wave {
  height: 140px;
  background: #1F1F1F;
  margin-bottom: 20px;
  border-radius: 6px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  flex: 1;
  padding: 14px;
  background: #5F5F5F;
  color: #F0F0F0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

button.active {
  background: #7F7F7F;
}

.meter-container {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.meter {
  flex: 1;
  background: #1F1F1F;
  padding: 15px;
  border-radius: 6px;
}

.meter h3 {
  margin: 0 0 10px 0;
  font-weight: normal;
}

.value {
  font-size: 20px;
  margin-bottom: 5px;
}

.bar {
  height: 10px;
  background: #5F5F5F;
  border-radius: 4px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #F0F0F0;
}
</style>
</head>
<body>

<div class="container">

  <div id="waveBefore" class="wave"></div>
  <div id="waveAfter" class="wave"></div>

  <div class="controls">
    <button id="playBtn">Play / Pause</button>
    <button id="beforeBtn" class="active">Before</button>
    <button id="afterBtn">After</button>
  </div>

  <div class="meter-container">

    <div class="meter">
      <h3>Before</h3>
      <div class="value" id="lufsBefore">LUFS: --</div>
      <div class="value" id="peakBefore">True Peak: -- dBTP</div>
      <div class="bar"><div id="barBefore" class="fill"></div></div>
    </div>

    <div class="meter">
      <h3>After</h3>
      <div class="value" id="lufsAfter">LUFS: --</div>
      <div class="value" id="peakAfter">True Peak: -- dBTP</div>
      <div class="bar"><div id="barAfter" class="fill"></div></div>
    </div>

  </div>

</div>

<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const before = WaveSurfer.create({
  container: '#waveBefore',
  waveColor: '#5F5F5F',
  progressColor: '#F0F0F0',
  backend: 'WebAudio',
  height: 140,
  audioContext: audioContext
});

const after = WaveSurfer.create({
  container: '#waveAfter',
  waveColor: '#5F5F5F',
  progressColor: '#F0F0F0',
  backend: 'WebAudio',
  height: 140,
  audioContext: audioContext
});

// LOAD FILES
before.load('SampleBefore.wav');
after.load('SampleAfter.wav');

let playing = false;

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');

function switchTrack(track) {
  if (track === 'before') {
    before.setVolume(1);
    after.setVolume(0);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  } else {
    before.setVolume(0);
    after.setVolume(1);
    afterBtn.classList.add('active');
    beforeBtn.classList.remove('active');
  }
}

playBtn.onclick = () => {
  if (!playing) {
    before.play();
    after.play();
    playing = true;
  } else {
    before.pause();
    after.pause();
    playing = false;
  }
};

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');

document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    playBtn.click();
  }
});

// LUFS + True Peak Meter
function createMeter(wavesurfer, lufsEl, peakEl, barEl) {
  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 4096;
  wavesurfer.backend.setFilter(analyser);

  const buffer = new Float32Array(analyser.fftSize);

  function update() {
    analyser.getFloatTimeDomainData(buffer);

    let sum = 0;
    let peak = 0;

    for (let i = 0; i < buffer.length; i++) {
      let sample = buffer[i];

      sum += sample * sample;

      // Oversampled peak approximation (4x linear interpolation)
      if (i > 0) {
        let interp1 = (buffer[i-1] + sample) / 2;
        peak = Math.max(peak, Math.abs(sample), Math.abs(interp1));
      } else {
        peak = Math.max(peak, Math.abs(sample));
      }
    }

    let rms = Math.sqrt(sum / buffer.length);
    let lufs = 20 * Math.log10(rms);
    if (lufs < -60) lufs = -60;

    let dbtp = 20 * Math.log10(peak);
    if (dbtp < -60) dbtp = -60;

    lufsEl.textContent = "LUFS: " + lufs.toFixed(1);
    peakEl.textContent = "True Peak: " + dbtp.toFixed(1) + " dBTP";

    let percent = Math.min((peak + 1) / 1 * 100, 100);
    barEl.style.width = percent + "%";

    requestAnimationFrame(update);
  }

  update();
}

before.on('ready', () => {
  createMeter(
    before,
    document.getElementById('lufsBefore'),
    document.getElementById('peakBefore'),
    document.getElementById('barBefore')
  );
});

after.on('ready', () => {
  createMeter(
    after,
    document.getElementById('lufsAfter'),
    document.getElementById('peakAfter'),
    document.getElementById('barAfter')
  );
});

switchTrack('before');
</script>

</body>
</html>
