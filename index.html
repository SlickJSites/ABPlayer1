<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Undisputed</title>

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>
body {
  background: #0F0F0F;
  color: #F0F0F0;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.wave {
  height: 140px;
  background: #1F1F1F;
  margin-bottom: 20px;
  border-radius: 6px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  flex: 1;
  padding: 14px;
  background: #5F5F5F;
  color: #F0F0F0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

button.active {
  background: #7F7F7F;
}

.meter-container {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.meter {
  flex: 1;
  background: #1F1F1F;
  padding: 15px;
  border-radius: 6px;
}

.meter h3 {
  margin: 0 0 10px 0;
  font-weight: normal;
}

.value {
  font-size: 20px;
  margin-bottom: 5px;
}

.bar {
  height: 10px;
  background: #5F5F5F;
  border-radius: 4px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #F0F0F0;
}
</style>
</head>
<body>

<div class="container">

  <div id="waveBefore" class="wave"></div>
  <div id="waveAfter" class="wave"></div>

  <div class="controls">
    <button id="playBtn">Play / Pause</button>
    <button id="beforeBtn" class="active">Before</button>
    <button id="afterBtn">After</button>
  </div>

  <div class="meter-container">

    <div class="meter">
      <h3>Before</h3>
      <div class="value" id="lufsBefore">LUFS: --</div>
      <div class="value" id="peakBefore">True Peak: -- dBTP</div>
      <div class="bar"><div id="barBefore" class="fill"></div></div>
    </div>

    <div class="meter">
      <h3>After</h3>
      <div class="value" id="lufsAfter">LUFS: --</div>
      <div class="value" id="peakAfter">True Peak: -- dBTP</div>
      <div class="bar"><div id="barAfter" class="fill"></div></div>
    </div>

  </div>

</div>

<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function createWave(container) {
  return WaveSurfer.create({
    container: container,
    waveColor: '#5F5F5F',
    progressColor: '#F0F0F0',
    backend: 'MediaElement',
    height: 140,
  });
}

const before = createWave('#waveBefore');
const after = createWave('#waveAfter');

before.load('SampleBefore.wav');
after.load('SampleAfter.wav');

let playing = false;

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');

function switchTrack(track) {
  if (track === 'before') {
    before.setVolume(1);
    after.setVolume(0);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  } else {
    before.setVolume(0);
    after.setVolume(1);
    afterBtn.classList.add('active');
    beforeBtn.classList.remove('active');
  }
}

// LOCK SEEKING (No Drift)
function lockSync(source, target) {
  source.on('seeking', () => {
    const time = source.getCurrentTime();
    target.setTime(time);
  });
}

lockSync(before, after);
lockSync(after, before);

// Play / Pause
playBtn.onclick = async () => {
  await audioContext.resume();

  if (!playing) {
    before.play();
    after.play();
    playing = true;
  } else {
    before.pause();
    after.pause();
    playing = false;
  }
};

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');

document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    playBtn.click();
  }
});

// INTEGRATED LUFS (Gated Accumulation)
function createIntegratedMeter(wavesurfer, lufsEl, peakEl, barEl) {

  wavesurfer.on('ready', () => {

    const media = wavesurfer.getMediaElement();
    const source = audioContext.createMediaElementSource(media);
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 4096;

    source.connect(analyser);
    analyser.connect(audioContext.destination);

    const buffer = new Float32Array(analyser.fftSize);

    let integratedEnergy = 0;
    let integratedSamples = 0;
    let maxTruePeak = -Infinity;

    function update() {

      analyser.getFloatTimeDomainData(buffer);

      let sum = 0;
      let peak = 0;

      for (let i = 0; i < buffer.length; i++) {
        let sample = buffer[i];
        sum += sample * sample;

        // Simple inter-sample approximation
        if (i > 0) {
          let interp = (buffer[i - 1] + sample) / 2;
          peak = Math.max(peak, Math.abs(sample), Math.abs(interp));
        } else {
          peak = Math.max(peak, Math.abs(sample));
        }
      }

      // ===== INTEGRATED LUFS =====
      let rms = Math.sqrt(sum / buffer.length);
      let momentary = 20 * Math.log10(rms);

      if (momentary > -70) {
        integratedEnergy += sum;
        integratedSamples += buffer.length;
      }

      let integratedLufs = -60;

      if (integratedSamples > 0) {
        let meanSquare = integratedEnergy / integratedSamples;
        integratedLufs = 20 * Math.log10(Math.sqrt(meanSquare));
      }

      if (!isFinite(integratedLufs)) integratedLufs = -60;

      lufsEl.textContent = "Integrated LUFS: " + integratedLufs.toFixed(1);

      // ===== OVERALL TRUE PEAK =====
      let currentDbtp = 20 * Math.log10(peak);
      if (!isFinite(currentDbtp)) currentDbtp = -60;

      if (currentDbtp > maxTruePeak) {
        maxTruePeak = currentDbtp;
      }

      peakEl.textContent = "Max True Peak: " + maxTruePeak.toFixed(1) + " dBTP";

      // Peak bar reflects MAX peak
      let percent = Math.min(Math.pow(10, maxTruePeak / 20) * 100, 100);
      barEl.style.width = percent + "%";

      requestAnimationFrame(update);
    }

    // Reset when restarting from beginning
    wavesurfer.on('seek', (progress) => {
      if (progress === 0) {
        maxTruePeak = -Infinity;
        integratedEnergy = 0;
        integratedSamples = 0;
      }
    });

    update();
  });
}

createIntegratedMeter(
  before,
  document.getElementById('lufsBefore'),
  document.getElementById('peakBefore'),
  document.getElementById('barBefore')
);

createIntegratedMeter(
  after,
  document.getElementById('lufsAfter'),
  document.getElementById('peakAfter'),
  document.getElementById('barAfter')
);

switchTrack('before');
</script>

</body>
</html>
