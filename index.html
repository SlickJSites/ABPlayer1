<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Player Undisputed</title>

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>
body {
  background: #0F0F0F;
  color: #F0F0F0;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.wave {
  height: 140px;
  background: #1F1F1F;
  margin-bottom: 20px;
  border-radius: 6px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  flex: 1;
  padding: 14px;
  background: #5F5F5F;
  color: #F0F0F0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

button.active {
  background: #7F7F7F;
}

.meter-container {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.meter {
  flex: 1;
  background: #1F1F1F;
  padding: 15px;
  border-radius: 6px;
}

.meter h3 {
  margin: 0 0 10px 0;
  font-weight: normal;
}

.value {
  font-size: 20px;
  margin-bottom: 5px;
}

.bar {
  height: 10px;
  background: #5F5F5F;
  border-radius: 4px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #F0F0F0;
}
</style>
</head>
<body>

<div class="container">

  <div id="waveBefore" class="wave"></div>
  <div id="waveAfter" class="wave"></div>

  <div class="controls">
    <button id="playBtn">Play / Pause</button>
    <button id="beforeBtn" class="active">Before</button>
    <button id="afterBtn">After</button>
  </div>

  </div>

</div>

<script>
function createWave(container) {
  return WaveSurfer.create({
    container: container,
    waveColor: '#5F5F5F',
    progressColor: '#F0F0F0',
    backend: 'MediaElement',
    height: 140,
  });
}

const before = createWave('#waveBefore');
const after = createWave('#waveAfter');

before.load('SampleBefore.wav');
after.load('SampleAfter.wav');

let playing = false;

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');

// Enable native looping once ready
function enableLoop(wavesurfer) {
  wavesurfer.on('ready', () => {
    const media = wavesurfer.getMediaElement();
    media.loop = true;
  });
}

enableLoop(before);
enableLoop(after);

// A/B Switch
function switchTrack(track) {
  if (track === 'before') {
    before.setVolume(1);
    after.setVolume(0);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  } else {
    before.setVolume(0);
    after.setVolume(1);
    afterBtn.classList.add('active');
    beforeBtn.classList.remove('active');
  }
}

// Lock seeking between both players
function lockSync(source, target) {
  source.on('seeking', () => {
    const time = source.getCurrentTime();
    target.setTime(time);
  });
}

lockSync(before, after);
lockSync(after, before);

// Play / Pause
playBtn.onclick = () => {
  if (!playing) {
    before.play();
    after.play();
    playing = true;
  } else {
    before.pause();
    after.pause();
    playing = false;
  }
};

// Spacebar toggle
document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    playBtn.click();
  }
});

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');

// Default to BEFORE
switchTrack('before');
</script>

</body>
</html>
