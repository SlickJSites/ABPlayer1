<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample 1</title>

<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

<style>
body {
  background: #0F0F0F;
  color: #F0F0F0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  padding: 60px 20px;
  margin: 0;
}

h1 {
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 50px;
}

.wave-container {
  margin-bottom: 50px;
}

button {
  background: #1F1F1F;
  color: #F0F0F0;
  border: 1px solid #333;
  padding: 12px 28px;
  margin: 10px;
  font-size: 15px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  background: #7F7F7F;
}

button.active {
  background: #F0F0F0;
  color: #111111;
  border-color: #F0F0F0;
}

#waveBefore,
#waveAfter {
  max-width: 900px;
  margin: 0 auto;
}
</style>
</head>

<body>

<h1>SAMPLE 1</h1>

<div class="wave-container">
  <div id="waveBefore"></div>
</div>

<div class="wave-container">
  <div id="waveAfter"></div>
</div>

<div>
  <button id="playBtn">Play / Pause</button>
  <button id="beforeBtn" class="active">Before</button>
  <button id="afterBtn">After</button>
</div>

<script>
function createWave(container) {
  return WaveSurfer.create({
    container: container,
    waveColor: '#5F5F5F',
    progressColor: '#F0F0F0',
    backend: 'MediaElement',
    height: 110,
  });
}

const before = createWave('#waveBefore');
const after = createWave('#waveAfter');

before.load('SampleBefore.wav');
after.load('SampleAfter.wav');

let playing = false;
let isSyncing = false;

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');


// =======================
// ENABLE NATIVE LOOPING
// =======================
function enableNativeLoop(ws) {
  ws.on('ready', () => {
    const media = ws.getMediaElement();
    media.loop = true;
  });
}

enableNativeLoop(before);
enableNativeLoop(after);


// =======================
// SAFE SEEK SYNC
// =======================
function lockSync(source, target) {
  source.on('seeking', () => {
    if (isSyncing) return;

    isSyncing = true;
    const time = source.getCurrentTime();
    target.setTime(time);
    isSyncing = false;
  });
}

lockSync(before, after);
lockSync(after, before);


// =======================
// PLAY / PAUSE
// =======================
playBtn.onclick = () => {
  if (!playing) {
    before.play();
    after.play();
    playing = true;
  } else {
    before.pause();
    after.pause();
    playing = false;
  }
};


// =======================
// SPACEBAR CONTROL
// =======================
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playBtn.click();
  }
});


// =======================
// A/B SWITCH
// =======================
function switchTrack(track) {
  if (track === 'before') {
    before.setVolume(1);
    after.setVolume(0);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  } else {
    before.setVolume(0);
    after.setVolume(1);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  }
}

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');

switchTrack('before');
</script>

</body>
</html>
