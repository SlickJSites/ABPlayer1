<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Mastering Player</title>

<script src="https://unpkg.com/wavesurfer.js@7"></script>

<style>
body {
  background: #0F0F0F;
  color: #F0F0F0;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.wave {
  height: 140px;
  background: #1F1F1F;
  margin-bottom: 20px;
  border-radius: 6px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  flex: 1;
  padding: 14px;
  background: #5F5F5F;
  color: #F0F0F0;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

button.active {
  background: #7F7F7F;
}

.value {
  font-size: 22px;
  color: #F0F0F0;
}
</style>
</head>
<body>

<div class="container">

  <div id="waveBefore" class="wave"></div>
  <div id="waveAfter" class="wave"></div>

  <div class="controls">
    <button id="playBtn">Play / Pause</button>
    <button id="beforeBtn" class="active">Before</button>
    <button id="afterBtn">After</button>
  </div>

</div>

<script>
function createWave(container) {
  return WaveSurfer.create({
    container: container,
    waveColor: '#5F5F5F',
    progressColor: '#F0F0F0',
    backend: 'MediaElement',
    height: 140,
  });
}

const before = createWave('#waveBefore');
const after = createWave('#waveAfter');

before.load(’SampleBefore.wav');
after.load(‘SampleAfter.wav');

let playing = false;
let isSyncing = false;

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');


// =======================
// LOCK SEEK SYNC (SAFE)
// =======================
function lockSync(source, target) {
  source.on('seeking', () => {
    if (isSyncing) return;

    isSyncing = true;
    const time = source.getCurrentTime();
    target.setTime(time);
    isSyncing = false;
  });
}

lockSync(before, after);
lockSync(after, before);


// =======================
// RELIABLE LOOPING
// =======================
function enableLoop(ws1, ws2) {
  ws1.on('finish', () => {
    if (!playing) return;

    ws1.setTime(0);
    ws2.setTime(0);

    ws1.play();
    ws2.play();
  });
}

enableLoop(before, after);


// =======================
// PLAY / PAUSE
// =======================
playBtn.onclick = () => {
  if (!playing) {
    before.play();
    after.play();
    playing = true;
  } else {
    before.pause();
    after.pause();
    playing = false;
  }
};


// =======================
// SPACEBAR TOGGLE
// =======================
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playBtn.click();
  }
});


// =======================
// A/B SWITCH
// =======================
function switchTrack(track) {
  if (track === 'before') {
    before.setVolume(1);
    after.setVolume(0);
    beforeBtn.classList.add('active');
    afterBtn.classList.remove('active');
  } else {
    before.setVolume(0);
    after.setVolume(1);
    afterBtn.classList.add('active');
    beforeBtn.classList.remove('active');
  }
}

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');


// Default state
switchTrack('before');
</script>

</body>
</html>
