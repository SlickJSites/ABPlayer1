<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastering Preview</title>

<script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

<style>
body {
  background: #111111;
  color: #F0F0F0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  padding: 60px 20px;
  margin: 0;
}

h1 {
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 50px;
}

.wave-container {
  margin-bottom: 50px;
}

button {
  background: #1A1A1A;
  color: #F0F0F0;
  border: 1px solid #333;
  padding: 12px 28px;
  margin: 10px;
  font-size: 15px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  background: #222;
}

button.active {
  background: #F0F0F0;
  color: #111111;
  border-color: #F0F0F0;
}

#waveBefore,
#waveAfter {
  max-width: 900px;
  margin: 0 auto;
}
</style>
</head>

<body>

<h1>Mastering Preview</h1>

<div class="wave-container">
  <div id="waveBefore"></div>
</div>

<div class="wave-container">
  <div id="waveAfter"></div>
</div>

<div>
  <button id="playBtn">Play / Pause</button>
  <button id="beforeBtn" class="active">Before</button>
  <button id="afterBtn">After</button>
</div>

<!-- ONE MASTER AUDIO ELEMENT -->
<audio id="masterAudio" loop></audio>

<script>
const masterAudio = document.getElementById('masterAudio');

function createWave(container, file) {
  const ws = WaveSurfer.create({
    container: container,
    waveColor: '#5F5F5F',
    progressColor: '#F0F0F0',
    backend: 'MediaElement',
    media: masterAudio,   // share ONE audio element
    height: 110,
  });

  ws.load(file);
  return ws;
}

// Both waveforms share same audio engine
const before = createWave('#waveBefore', 'SampleBefore.wav');
const after = createWave('#waveAfter', 'SampleAfter.wav');

let playing = false;
let currentTrack = 'before';

const playBtn = document.getElementById('playBtn');
const beforeBtn = document.getElementById('beforeBtn');
const afterBtn = document.getElementById('afterBtn');

// Switch source cleanly
function switchTrack(track) {
  if (track === currentTrack) return;

  const currentTime = masterAudio.currentTime;
  const wasPlaying = !masterAudio.paused;

  masterAudio.pause();

  masterAudio.src = track === 'before' ? 'before.wav' : 'after.wav';
  masterAudio.currentTime = currentTime;

  if (wasPlaying) {
    masterAudio.play();
  }

  currentTrack = track;

  beforeBtn.classList.toggle('active', track === 'before');
  afterBtn.classList.toggle('active', track === 'after');
}

beforeBtn.onclick = () => switchTrack('before');
afterBtn.onclick = () => switchTrack('after');

// Play / Pause
playBtn.onclick = () => {
  if (!playing) {
    masterAudio.play();
    playing = true;
  } else {
    masterAudio.pause();
    playing = false;
  }
};

// Spacebar
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    playBtn.click();
  }
});

// Default source
masterAudio.src = 'before.wav';
</script>

</body>
</html>
